version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - backend

  # Backend API Service
  backend:
    build:
      context: ./server
      dockerfile: ../Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - CORS_ORIGIN=http://localhost:5173
      - PTERODACTYL_INSTANCES=https://panel.pterodactyl.io
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

volumes:
  node_modules:
